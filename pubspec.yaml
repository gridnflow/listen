name: listen
description: "Offline audio player - podcasts, free music, and local files"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Audio
  just_audio: ^0.9.43
  audio_service: ^0.18.17

  # Local Storage
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.1

  # File Handling
  file_picker: ^9.2.1
  on_audio_query: ^2.9.0
  permission_handler: ^11.4.0

  # Podcast
  webfeed_plus: ^1.1.2
  dio: ^5.7.0
  html: ^0.15.5
  cached_network_image: ^3.4.1
  intl: ^0.19.0

  # UI
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0
  youtube_explode_dart: ^2.3.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  drift_dev: ^2.23.1
  build_runner: ^2.4.14
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
